version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    environment:
      - DATABASE_URL=postgresql://mawhebti_user:mawhebti_pass@db:5432/mawhebti_db
      - CORS_ALLOWED_ORIGINS=http://localhost:5173,http://127.0.0.1:5173,http://192.168.182.128:5173
      - GEMINI_API_KEY=${GEMINI_API_KEY:-AQ.Ab8RN6K7TkN9GYIwwIDwnPWH9zVKJKwMq9YX7IWzePfqnM5nrQ}
    depends_on:
      db:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - CHOKIDAR_USEPOLLING=true
      - VITE_API_URL=http://192.168.182.128:8000/api/v1

  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: mawhebti_user
      POSTGRES_PASSWORD: mawhebti_pass
      POSTGRES_DB: mawhebti_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mawhebti_user -d mawhebti_db"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
